name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write   # Cần cho OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::525417585532:role/dev-github-actions-role
          aws-region: ap-southeast-1

      - name: Trigger ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name dev-asg \
            --preferences '{"MinHealthyPercentage": 0, "InstanceWarmup": 120}'
          echo "Instance Refresh started! EC2 mới sẽ clone code mới nhất."

      - name: Wait for refresh to complete
        run: |
          echo "Waiting for instance refresh..."
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name dev-asg \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "Successful" ]; then
              echo "Deploy complete!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed!"
              exit 1
            fi
            sleep 30
          done
